<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="Fira Code, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="50%" stop-color="#211d42"/>
      <stop offset="100%" stop-color="#0F0C29"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2CB1FF"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="220" fill="url(#bg)" rx="12"/>

  <!-- Nodes -->
  <g font-size="13" font-weight="600">
    <!-- User -->
    <rect x="20" y="90" width="110" height="44" rx="8" fill="#1a1640" stroke="#7F5AF0" stroke-width="1.5"/>
    <text x="75" y="117" fill="#ffffff" text-anchor="middle">User</text>

    <!-- Client -->
    <rect x="170" y="90" width="130" height="44" rx="8" fill="#1a1640" stroke="#7F5AF0" stroke-width="1.5"/>
    <text x="235" y="112" fill="#ffffff" text-anchor="middle">React / Next.js</text>
    <text x="235" y="127" fill="#9d97c9" text-anchor="middle" font-size="10">multi-channel: web/WA/Telegram</text>

    <!-- API -->
    <rect x="340" y="90" width="120" height="44" rx="8" fill="#1a1640" stroke="#2CB1FF" stroke-width="1.5"/>
    <text x="400" y="112" fill="#ffffff" text-anchor="middle">API Layer</text>
    <text x="400" y="127" fill="#9d97c9" text-anchor="middle" font-size="10">Rails / Node.js</text>

    <!-- Orchestrator -->
    <rect x="500" y="90" width="150" height="44" rx="8" fill="#1a1640" stroke="#2CB1FF" stroke-width="1.5"/>
    <text x="575" y="112" fill="#ffffff" text-anchor="middle">Agent Orchestrator</text>
    <text x="575" y="127" fill="#9d97c9" text-anchor="middle" font-size="10">planning · tool calls</text>

    <!-- LLM + Tools -->
    <rect x="690" y="60" width="190" height="40" rx="8" fill="#1a1640" stroke="#FFD166" stroke-width="1.5"/>
    <text x="785" y="85" fill="#ffffff" text-anchor="middle" font-size="12">LLM (structured output)</text>

    <rect x="690" y="110" width="190" height="40" rx="8" fill="#1a1640" stroke="#FFD166" stroke-width="1.5"/>
    <text x="785" y="135" fill="#ffffff" text-anchor="middle" font-size="12">Tools / Retrieval / Data</text>
  </g>

  <!-- Arrows -->
  <path d="M130,112 L168,112" stroke="#2CB1FF" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M300,112 L338,112" stroke="#2CB1FF" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M460,112 L498,112" stroke="#2CB1FF" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M650,102 L688,80" stroke="#2CB1FF" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M650,122 L688,130" stroke="#2CB1FF" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <!-- footer caption -->
  <text x="450" y="195" fill="#6f6a94" text-anchor="middle" font-size="11">validation layers + resilient fallback design at every hop</text>
</svg>
