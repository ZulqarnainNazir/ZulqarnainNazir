<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071B2E"/>
      <stop offset="50%" stop-color="#0D2E4C"/>
      <stop offset="100%" stop-color="#071B2E"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5EEAD4"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="220" fill="url(#bg)" rx="4"/>
  <rect x="0.5" y="0.5" width="899" height="219" fill="none" stroke="#1B4363" stroke-width="1" rx="4"/>

  <!-- Nodes -->
  <g font-size="13" font-weight="600">
    <!-- User -->
    <rect x="20" y="90" width="110" height="44" fill="#0A2540" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="75" y="117" fill="#EAF1F6" text-anchor="middle">User</text>

    <!-- Client -->
    <rect x="170" y="90" width="130" height="44" fill="#0A2540" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="235" y="112" fill="#EAF1F6" text-anchor="middle">React / Next.js</text>
    <text x="235" y="127" fill="#84A2B8" text-anchor="middle" font-size="10">multi-channel: web/WA/Telegram</text>

    <!-- API -->
    <rect x="340" y="90" width="120" height="44" fill="#0A2540" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="400" y="112" fill="#EAF1F6" text-anchor="middle">API Layer</text>
    <text x="400" y="127" fill="#84A2B8" text-anchor="middle" font-size="10">Rails / Node.js</text>

    <!-- Orchestrator -->
    <rect x="500" y="90" width="150" height="44" fill="#0A2540" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="575" y="112" fill="#EAF1F6" text-anchor="middle">Agent Orchestrator</text>
    <text x="575" y="127" fill="#84A2B8" text-anchor="middle" font-size="10">planning · tool calls</text>

    <!-- LLM + Tools -->
    <rect x="690" y="60" width="190" height="40" fill="#0A2540" stroke="#F5A623" stroke-width="1.5"/>
    <text x="785" y="85" fill="#EAF1F6" text-anchor="middle" font-size="12">LLM (structured output)</text>

    <rect x="690" y="110" width="190" height="40" fill="#0A2540" stroke="#F5A623" stroke-width="1.5"/>
    <text x="785" y="135" fill="#EAF1F6" text-anchor="middle" font-size="12">Tools / Retrieval / Data</text>
  </g>

  <!-- corner registration marks -->
  <g stroke="#5EEAD4" stroke-width="1.5" fill="none">
    <path d="M8,20 L8,8 L20,8"/>
    <path d="M880,8 L892,8 L892,20"/>
    <path d="M8,200 L8,212 L20,212"/>
    <path d="M892,200 L892,212 L880,212"/>
  </g>

  <!-- Arrows -->
  <path d="M130,112 L168,112" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M300,112 L338,112" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M460,112 L498,112" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M650,102 L688,80" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M650,122 L688,130" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <!-- footer caption -->
  <text x="450" y="195" fill="#5B7690" text-anchor="middle" font-size="11">validation layers + resilient fallback design at every hop</text>
</svg>
